<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-4">
  <form id="studentForm" onsubmit="submitForm(event)">

    <div class="bg-white rounded-lg shadow-sm p-4 mb-4 border border-gray-200">
      <h2 class="text-lg font-bold text-gray-700 mb-3 border-b pb-2">🎓 Student Information</h2>
      <div class="grid grid-cols-2 gap-3">
        
        <div class="col-span-2">
          <label class="block text-xs font-semibold text-gray-600 mb-1">Override Type *</label>
          <select id="entryType" onchange="handleTypeChange()" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-white font-semibold">
            <option value="Edit Existing Student">✏️ Edit Existing Student (Override ATS Data)</option>
            <option value="New Student">✨ New Student (Not in ATS Yet)</option>
          </select>
        </div>

        <div id="selectStudentContainer" class="col-span-2 p-3 bg-blue-50 border border-blue-200 rounded-md relative">
          <label class="block text-xs font-bold text-blue-800 mb-2">🔍 Search Database to Auto-Fill</label>
          <div class="relative">
            <input type="text" id="searchUniversal" oninput="handleSearch()" autocomplete="off" disabled class="w-full px-3 py-2 border border-blue-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50" placeholder="Loading DB...">
            
            <div id="searchResults" class="absolute left-0 right-0 top-full mt-1 bg-white border border-gray-300 rounded shadow-lg max-h-48 overflow-y-auto hidden z-50">
            </div>
          </div>
        </div>

        <div class="col-span-2 sm:col-span-1">
          <label class="block text-xs font-semibold text-gray-600 mb-1">OSIS / Student ID *</label>
          <input type="text" id="osis" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="e.g. 123456789">
        </div>
        <div class="col-span-2 sm:col-span-1">
          <label class="block text-xs font-semibold text-gray-600 mb-1">Official Class *</label>
          <input type="text" id="classCode" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="e.g. Y66">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">First Name *</label>
          <input type="text" id="firstName" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Last Name *</label>
          <input type="text" id="lastName" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>
        
        <!-- NEW LABEL / STATUS FIELD -->
        <div>
          <label class="block text-xs font-semibold text-purple-700 mb-1">Status / Label</label>
          <input type="text" id="label" class="w-full px-3 py-2 border border-purple-300 bg-purple-50 rounded focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm font-semibold text-purple-900" placeholder="e.g. Current">
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Grade</label>
          <input type="text" id="grade" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Age</label>
          <input type="number" id="age" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Gender</label>
          <input type="text" id="gender" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>
        <div class="col-span-2">
          <label class="block text-xs font-semibold text-gray-600 mb-1">Home Language</label>
          <input type="text" id="homeLanguage" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>
      </div>
    </div>

    <div id="siblingNotice" class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-4 hidden shadow-sm rounded-r-lg">
      <div class="flex">
        <div class="flex-shrink-0">
          <svg class="h-5 w-5 text-yellow-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
          </svg>
        </div>
        <div class="ml-3">
          <p class="text-sm text-yellow-800" id="siblingNoticeText">
            <b>Notice:</b> This child has a sibling that attends this school.
          </p>
        </div>
      </div>
    </div>

    <div id="guardiansContainer"></div>

    <div class="mb-6 mt-2 text-center">
        <button type="button" id="addGuardianBtn" onclick="showNextGuardian()" class="text-blue-600 hover:text-blue-800 font-semibold text-sm flex items-center justify-center w-full py-2 border-2 border-dashed border-blue-200 rounded-lg hover:border-blue-400 bg-blue-50 hover:bg-blue-100 transition-colors">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            Add Another Guardian
        </button>
    </div>

    <!-- NEW STEALTH MODE TOGGLE -->
    <div class="bg-gray-100 p-3 rounded-md mb-4 border border-gray-200 flex items-center">
      <input type="checkbox" id="hideFromReport" class="h-4 w-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer">
      <label for="hideFromReport" class="ml-2 block text-sm font-semibold text-gray-700 cursor-pointer">
        🚫 Stealth Mode: Hide this override from the Delta Report
      </label>
    </div>

    <div class="sticky bottom-0 bg-gray-50 pt-2 pb-2 border-t flex justify-end gap-3 mt-4">
        <button type="button" onclick="closeDialog()" class="px-4 py-2 text-sm font-medium text-gray-600 bg-white border border-gray-300 rounded-md hover:bg-gray-50 shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-300">Cancel</button>
        
        <button type="button" id="syncSiblingsBtn" onclick="submitSyncSiblings()" class="hidden px-4 py-2 text-sm font-medium text-white bg-purple-600 border border-transparent rounded-md hover:bg-purple-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500">Sync to All Siblings</button>
        
        <button type="submit" id="submitBtn" onclick="isSyncingSiblings = false" disabled class="opacity-50 px-5 py-2 text-sm font-medium text-white bg-blue-600 border border-transparent rounded-md hover:bg-blue-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">Loading DB...</button>
    </div>
  </form>

  <script>
    let visibleGuardians = 2; 
    const MAX_GUARDIANS = 5;
    window.allStudents = []; 
    
    // Globals for sibling tracking
    let currentSiblings = [];
    let isSyncingSiblings = false;

    function buildGuardianHTML(index, isVisible) {
        const display = isVisible ? 'block' : 'none';
        return `
        <div id="guardianBlock${index}" class="bg-white rounded-lg shadow-sm p-4 mb-4 border border-gray-200" style="display: ${display};">
            <h2 class="text-md font-bold text-gray-700 mb-3 border-b pb-2 flex justify-between items-center">
                👨‍👩‍👧 Guardian ${index}
                ${index > 2 ? `<button type="button" onclick="hideGuardian(${index})" class="text-xs text-red-500 hover:text-red-700 font-normal">Remove</button>` : ''}
            </h2>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Name ${index === 1 ? '*' : ''}</label>
                    <input type="text" id="g${index}Name" ${index === 1 ? 'required' : ''} class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="First Last">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Relationship</label>
                    <input type="text" id="g${index}Rel" placeholder="e.g. Mother" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Phone</label>
                    <input type="tel" id="g${index}Phone" placeholder="(555) 555-5555" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Email</label>
                    <input type="email" id="g${index}Email" placeholder="email@example.com" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                </div>
                <div class="col-span-2">
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Language</label>
                    <input type="text" id="g${index}Lang" placeholder="e.g. Spanish" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                </div>
            </div>
        </div>`;
    }

    window.onload = function() {
        const container = document.getElementById('guardiansContainer');
        let html = '';
        for(let i=1; i<=MAX_GUARDIANS; i++) html += buildGuardianHTML(i, i <= visibleGuardians);
        container.innerHTML = html;
        updateAddButton();

        if (typeof google !== 'undefined' && google.script && google.script.run) {
           google.script.run
             .withSuccessHandler(populateDropdown)
             .withFailureHandler((err) => alert("Failed to load ATS database: " + err.message))
             .getAllStudentsForEdit();
        }
    };

    function populateDropdown(students) {
      window.allStudents = students;
      const searchUniversal = document.getElementById('searchUniversal');

      searchUniversal.disabled = false;
      searchUniversal.placeholder = "Search parent, student, or OSIS...";

      const btn = document.getElementById('submitBtn');
      btn.disabled = false;
      btn.innerHTML = 'Save & Override Data';
      btn.classList.remove('opacity-50');

      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.withSuccessHandler(osis => {
            if (osis) {
                document.getElementById('entryType').value = 'Edit Existing Student';
                handleTypeChange();
                selectSearchResult(osis); 
            }
        }).getPrefillOsis();
      }
    }

    function handleSearch() {
        const query = document.getElementById('searchUniversal').value.toLowerCase().trim();
        const resultsContainer = document.getElementById('searchResults');

        if (!query) {
            resultsContainer.classList.add('hidden');
            return;
        }

        const searchTerms = query.split(/\s+/);
        let matches = window.allStudents.filter(s => {
            const searchableText = [
                s.osis, s.firstName, s.lastName,
                ...s.guardians.map(g => g.name || "")
            ].join(" ").toLowerCase();
            return searchTerms.every(term => searchableText.includes(term));
        });

        matches = matches.slice(0, 15);

        if (matches.length === 0) {
            resultsContainer.innerHTML = '<div class="p-3 text-sm text-gray-500 font-semibold text-center">No matching students found.</div>';
            resultsContainer.classList.remove('hidden');
            return;
        }

        let html = '';
        matches.forEach(s => {
            const gName = s.guardians.length > 0 ? s.guardians.map(g=>g.name).join(', ') : "No Guardian";
            html += `
            <div class="p-3 hover:bg-blue-50 cursor-pointer border-b border-gray-100 transition" onclick="selectSearchResult('${s.osis}')">
                <div class="font-bold text-gray-800">${s.lastName}, ${s.firstName} <span class="text-gray-500 font-normal text-xs ml-1">(${s.osis})</span></div>
                <div class="text-gray-600 text-xs mt-0.5"><b>Parent(s):</b> ${gName} &nbsp;|&nbsp; <b>Class:</b> ${s.classCode}</div>
            </div>`;
        });

        resultsContainer.innerHTML = html;
        resultsContainer.classList.remove('hidden');
    }

    function selectSearchResult(osis) {
        const student = window.allStudents.find(s => s.osis === osis);
        if (!student) return;

        document.getElementById('searchUniversal').value = `${student.lastName}, ${student.firstName} (${student.osis})`;
        document.getElementById('searchResults').classList.add('hidden');
        autoFillStudent(osis);
    }

    document.addEventListener('click', function(event) {
        const container = document.getElementById('selectStudentContainer');
        const results = document.getElementById('searchResults');
        if (container && !container.contains(event.target)) {
            if (results) results.classList.add('hidden');
        }
    });

    function findSiblings(student) {
        if (!student || !student.guardians || student.guardians.length === 0) return [];
        return window.allStudents.filter(s => {
            if (s.osis === student.osis) return false;
            return s.guardians.some(sg =>
                student.guardians.some(tg => {
                    const cleanSgName = (sg.name || "").toLowerCase().replace(/\s*\([^)]+\)\s*$/, "").trim();
                    const cleanTgName = (tg.name || "").toLowerCase().replace(/\s*\([^)]+\)\s*$/, "").trim();
                    if (!cleanSgName || !cleanTgName || cleanSgName !== cleanTgName) return false;

                    const sgPhone = (sg.phone || "").replace(/\D/g, "");
                    const tgPhone = (tg.phone || "").replace(/\D/g, "");
                    const sgEmail = (sg.email || "").toLowerCase().trim();
                    const tgEmail = (tg.email || "").toLowerCase().trim();

                    return (sgPhone && sgPhone === tgPhone) || (sgEmail && sgEmail === tgEmail);
                })
            );
        });
    }

    function handleTypeChange() {
      const type = document.getElementById('entryType').value;
      const selectDiv = document.getElementById('selectStudentContainer');
      
      if (type === "New Student") {
        selectDiv.style.display = "none";
        clearForm(); 
        document.getElementById('label').value = "Current"; // Default for new student
      } else {
        selectDiv.style.display = "block";
      }
    }

    function autoFillStudent(osis) {
      if (!osis) { clearForm(); return; }

      const student = window.allStudents.find(s => s.osis === osis);
      if (!student) return;

      document.getElementById('osis').value = student.osis;
      document.getElementById('classCode').value = student.classCode;
      document.getElementById('firstName').value = student.firstName;
      document.getElementById('lastName').value = student.lastName;
      document.getElementById('label').value = student.label || 'Current';
      document.getElementById('hideFromReport').checked = student.hideFromReport || false;
      document.getElementById('grade').value = student.grade || '';
      document.getElementById('age').value = student.age || '';
      document.getElementById('gender').value = student.gender || '';
      document.getElementById('homeLanguage').value = student.homeLanguage || '';

      for (let i = 1; i <= MAX_GUARDIANS; i++) {
        document.getElementById('g'+i+'Name').value = '';
        document.getElementById('g'+i+'Rel').value = '';
        document.getElementById('g'+i+'Phone').value = '';
        document.getElementById('g'+i+'Email').value = '';
        document.getElementById('g'+i+'Lang').value = '';
        document.getElementById('guardianBlock'+i).style.display = 'none';
      }

      visibleGuardians = Math.max(2, student.guardians.length); 
      for (let i = 0; i < student.guardians.length; i++) {
         const g = student.guardians[i];
         const index = i + 1;
         if (index > MAX_GUARDIANS) break;
         document.getElementById('g'+index+'Name').value = g.name || '';
         document.getElementById('g'+index+'Rel').value = g.relationship || '';
         document.getElementById('g'+index+'Phone').value = g.phone || '';
         document.getElementById('g'+index+'Email').value = g.email || '';
         document.getElementById('g'+index+'Lang').value = g.language || '';
      }

      for (let i = 1; i <= MAX_GUARDIANS; i++) {
          if (i <= visibleGuardians) document.getElementById('guardianBlock'+i).style.display = 'block';
      }
      updateAddButton();

      currentSiblings = findSiblings(student);
      const noticeDiv = document.getElementById('siblingNotice');
      const noticeText = document.getElementById('siblingNoticeText');
      const syncBtn = document.getElementById('syncSiblingsBtn');

      if (currentSiblings.length > 0) {
          noticeDiv.classList.remove('hidden');
          noticeText.innerHTML = `<b>Notice:</b> This child has ${currentSiblings.length} sibling(s) that attend this school (${currentSiblings.map(s => s.firstName).join(', ')}).`;
          syncBtn.classList.remove('hidden');
      } else {
          noticeDiv.classList.add('hidden');
          syncBtn.classList.add('hidden');
      }
    }

    function clearForm() {
      document.getElementById('searchUniversal').value = '';
      document.getElementById('searchResults').classList.add('hidden');

      document.getElementById('osis').value = '';
      document.getElementById('classCode').value = '';
      document.getElementById('firstName').value = '';
      document.getElementById('lastName').value = '';
      document.getElementById('label').value = '';
      document.getElementById('hideFromReport').checked = false;
      document.getElementById('grade').value = '';
      document.getElementById('age').value = '';
      document.getElementById('gender').value = '';
      document.getElementById('homeLanguage').value = '';
      
      for (let i = 1; i <= MAX_GUARDIANS; i++) {
        document.getElementById('g'+i+'Name').value = '';
        document.getElementById('g'+i+'Rel').value = '';
        document.getElementById('g'+i+'Phone').value = '';
        document.getElementById('g'+i+'Email').value = '';
        document.getElementById('g'+i+'Lang').value = '';
        document.getElementById('guardianBlock'+i).style.display = i <= 2 ? 'block' : 'none';
      }
      
      visibleGuardians = 2;
      updateAddButton();

      currentSiblings = [];
      isSyncingSiblings = false;
      document.getElementById('siblingNotice').classList.add('hidden');
      document.getElementById('syncSiblingsBtn').classList.add('hidden');
    }

    function showNextGuardian() {
        if (visibleGuardians < MAX_GUARDIANS) {
            visibleGuardians++;
            document.getElementById('guardianBlock' + visibleGuardians).style.display = 'block';
            updateAddButton();
        }
    }

    function hideGuardian(index) {
        document.getElementById('g'+index+'Name').value = '';
        document.getElementById('g'+index+'Rel').value = '';
        document.getElementById('g'+index+'Phone').value = '';
        document.getElementById('g'+index+'Email').value = '';
        document.getElementById('g'+index+'Lang').value = '';
        document.getElementById('guardianBlock' + index).style.display = 'none';
        visibleGuardians--;
        updateAddButton();
    }

    function updateAddButton() {
        const btn = document.getElementById('addGuardianBtn');
        btn.style.display = visibleGuardians >= MAX_GUARDIANS ? 'none' : 'flex';
    }

    function closeDialog() {
       if (typeof google !== 'undefined' && google.script && google.script.host) {
          google.script.host.close();
       }
    }

    function submitSyncSiblings() {
        if (!confirm("This will overwrite the guardian information for this student AND all of their siblings in the system. Are you sure?")) return;
        isSyncingSiblings = true;
        const form = document.getElementById('studentForm');
        if (form.reportValidity()) submitForm(new Event('submit', { cancelable: true }));
        else isSyncingSiblings = false;
    }

    function submitForm(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const syncBtn = document.getElementById('syncSiblingsBtn');
        
        btn.disabled = true;
        btn.classList.add('opacity-75');
        btn.innerHTML = 'Sending...';
        
        if (!syncBtn.classList.contains('hidden')) {
            syncBtn.disabled = true;
            syncBtn.classList.add('opacity-75');
        }

        const data = {
            entryType: document.getElementById('entryType').value.trim(),
            osis: document.getElementById('osis').value.trim(),
            classCode: document.getElementById('classCode').value.trim(),
            firstName: document.getElementById('firstName').value.trim(),
            lastName: document.getElementById('lastName').value.trim(),
            label: document.getElementById('label').value.trim(),
            hideFromReport: document.getElementById('hideFromReport').checked,
            grade: document.getElementById('grade').value.trim(),
            age: document.getElementById('age').value.trim(),
            gender: document.getElementById('gender').value.trim(),
            homeLanguage: document.getElementById('homeLanguage').value.trim(),
            guardians: []
        };

        for(let i=1; i<=MAX_GUARDIANS; i++) {
            const name = document.getElementById('g'+i+'Name').value.trim();
            if(name || i === 1) { 
                data.guardians.push({
                    name: name,
                    relationship: document.getElementById('g'+i+'Rel').value.trim(),
                    phone: document.getElementById('g'+i+'Phone').value.trim(),
                    email: document.getElementById('g'+i+'Email').value.trim(),
                    language: document.getElementById('g'+i+'Lang').value.trim()
                });
            }
        }

        let payloads = [data];

        if (isSyncingSiblings && currentSiblings.length > 0) {
            currentSiblings.forEach(sib => {
                let sibData = {
                    entryType: 'Edit Existing Student',
                    osis: sib.osis,
                    classCode: sib.classCode,
                    firstName: sib.firstName,
                    lastName: sib.lastName,
                    label: sib.label || data.label,
                    hideFromReport: data.hideFromReport,
                    grade: sib.grade || '',
                    age: sib.age || '',
                    gender: sib.gender || '',
                    homeLanguage: sib.homeLanguage || '',
                    guardians: data.guardians 
                };
                payloads.push(sibData);
            });
        }

        if (typeof google !== 'undefined' && google.script && google.script.run) {
           google.script.run
               .withSuccessHandler(() => google.script.host.close())
               .withFailureHandler((err) => {
                   alert("Error saving: " + err.message);
                   btn.disabled = false;
                   btn.innerHTML = 'Save & Override Data';
                   btn.classList.remove('opacity-75');
                   isSyncingSiblings = false;
               })
               .saveStudentOverrides(payloads);
        }
    }
  </script>
</body>
</html>
