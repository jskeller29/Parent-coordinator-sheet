<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f8fafc; color: #333; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }

    .header { padding: 18px 22px 10px 22px; }
    h2 { font-size: 18px; margin: 0 0 4px 0; color: #0f172a; }
    .sub { font-size: 13px; color: #64748b; margin: 0; }

    .changelog { flex: 1; overflow-y: auto; padding: 6px 22px 10px 22px; }
    .entry { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px 16px; margin-bottom: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
    .entry-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .ver { font-size: 15px; font-weight: bold; color: #0f172a; }
    .badge { font-size: 10px; font-weight: bold; padding: 3px 9px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    .badge.major { background: #fee2e2; color: #b91c1c; }
    .badge.small { background: #dbeafe; color: #1d4ed8; }
    .notes { font-size: 13px; color: #334155; line-height: 1.5; white-space: pre-wrap; margin: 0; }
    .getlink { display: inline-block; margin-top: 10px; padding: 7px 14px; background-color: #2563eb; color: #ffffff; text-decoration: none; border-radius: 6px; font-size: 12px; font-weight: 600; }
    .getlink:hover { background-color: #1d4ed8; }

    .older { margin: 2px 4px 14px 4px; }
    .older-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; padding-bottom: 5px; border-bottom: 1px solid #e2e8f0; }
    .older-title { font-size: 13px; font-weight: bold; color: #475569; }

    .loading { display: flex; align-items: center; gap: 10px; color: #64748b; font-size: 13px; padding: 10px 4px; }
    .spinner { width: 18px; height: 18px; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .errorbox { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 14px 16px; margin: 4px 0 12px 0; }
    .errorbox b { color: #b91c1c; font-size: 13px; display: block; margin-bottom: 6px; }
    .errorbox p { font-size: 12px; color: #7f1d1d; margin: 0; line-height: 1.5; word-break: break-word; white-space: pre-wrap; }

    .footer { border-top: 1px solid #e2e8f0; background: #ffffff; padding: 12px 22px 12px 22px; }
    .pref { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #334155; margin-bottom: 12px; user-select: none; cursor: pointer; }
    .pref input { width: 15px; height: 15px; cursor: pointer; margin: 0; }
    .saved { font-size: 11px; color: #16a34a; font-weight: 600; opacity: 0; transition: opacity .3s; }
    .saved.show { opacity: 1; }

    .btn-row { display: flex; gap: 10px; }
    button { border: none; border-radius: 6px; padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background-color .15s; }
    #dismissBtn { background: #2563eb; color: #ffffff; flex: 1; }
    #dismissBtn:hover { background: #1d4ed8; }
    #foreverBtn { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
    #foreverBtn:hover { background: #fee2e2; color: #b91c1c; border-color: #fecaca; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .hint { font-size: 11px; color: #94a3b8; margin: 9px 0 0 0; text-align: center; }
  </style>
</head>
<body>

  <div class="header">
    <h2>🚀 New Version Available!</h2>
    <p class="sub" id="subtitle">Checking the Version Tracker…</p>
  </div>

  <div class="changelog" id="changelog">
    <div class="loading"><div class="spinner"></div><span>Loading the changelog…</span></div>
  </div>

  <div class="footer">
    <label class="pref">
      <input type="checkbox" id="majorsOnly" onchange="savePref()">
      <span>🔕 Only notify me about <b>Major</b> updates</span>
      <span class="saved" id="savedTag">Saved ✓</span>
    </label>
    <div class="btn-row">
      <button id="dismissBtn" onclick="dismiss()">Dismiss</button>
      <button id="foreverBtn" onclick="dismissForever()">Dismiss Forever</button>
    </div>
    <p class="hint">You can always check manually: 🚀 App Menu → 🔔 Check for Updates</p>
  </div>

  <script>
    // No template tags in this file — the dialog PULLS its data from the
    // server (vc_getPayload in VersionCheck.gs) right after it loads. That
    // makes it immune to copy/paste template mangling, and any failure
    // shows a readable error instead of a blank panel.
    let DATA = null;
    let foreverArmed = false;

    // ==========================================
    // HELPERS
    // ==========================================
    function makeBadge(size) {
      const isMajor = String(size || '').trim().toLowerCase().indexOf('major') === 0;
      const badge = document.createElement('span');
      badge.className = 'badge ' + (isMajor ? 'major' : 'small');
      badge.textContent = isMajor ? 'Major' : 'Small';
      return badge;
    }

    function makeNotes(text) {
      const notes = document.createElement('p');
      notes.className = 'notes';
      notes.textContent = text || '(No notes provided)';
      return notes;
    }

    function showErrorBox(title, detail) {
      const list = document.getElementById('changelog');
      list.innerHTML = '';
      const box = document.createElement('div');
      box.className = 'errorbox';
      const b = document.createElement('b');
      b.textContent = '⚠️ ' + title;
      const p = document.createElement('p');
      p.textContent = detail;
      box.appendChild(b);
      box.appendChild(p);
      list.appendChild(box);
      document.getElementById('subtitle').textContent = 'Something went wrong loading the changelog.';
    }

    // ==========================================
    // RENDER
    // ==========================================
    function render() {
      document.getElementById('subtitle').textContent =
        "You're on v" + DATA.installedVersion + " — here's everything you've missed:";
      document.getElementById('majorsOnly').checked = !!DATA.majorsOnly;

      const list = document.getElementById('changelog');
      list.innerHTML = '';

      if (!DATA.entries || DATA.entries.length === 0) {
        document.getElementById('subtitle').textContent = "You're already caught up!";
        const card = document.createElement('div');
        card.className = 'entry';
        card.appendChild(makeNotes('No new updates to show — you can close this window.'));
        list.appendChild(card);
        return;
      }

      // ---- HERO CARD: the newest release, with the ONE link ----
      const newest = DATA.entries[0];
      const card = document.createElement('div');
      card.className = 'entry';

      const top = document.createElement('div');
      top.className = 'entry-top';
      const ver = document.createElement('span');
      ver.className = 'ver';
      ver.textContent = 'Version ' + newest.version;
      top.appendChild(ver);
      top.appendChild(makeBadge(newest.size));
      card.appendChild(top);
      card.appendChild(makeNotes(newest.notes));

      // Single button — always points at the latest template
      if (DATA.latestLink) {
        const a = document.createElement('a');
        a.className = 'getlink';
        a.href = DATA.latestLink;
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = '🔗 Get the Latest Version';
        card.appendChild(a);
      }
      list.appendChild(card);

      // ---- OLDER MISSED VERSIONS: plain changelog sections, no links ----
      DATA.entries.slice(1).forEach(function(e) {
        const sec = document.createElement('div');
        sec.className = 'older';

        const head = document.createElement('div');
        head.className = 'older-head';
        const title = document.createElement('span');
        title.className = 'older-title';
        title.textContent = 'Version ' + e.version + ' Changelog';
        head.appendChild(title);
        head.appendChild(makeBadge(e.size));
        sec.appendChild(head);

        sec.appendChild(makeNotes(e.notes));
        list.appendChild(sec);
      });
    }

    // ==========================================
    // ACTIONS
    // ==========================================
    function lockButtons(locked) {
      document.getElementById('dismissBtn').disabled = locked;
      document.getElementById('foreverBtn').disabled = locked;
    }

    // Marks the newest version as "seen" — won't pop again until something newer ships
    function dismiss() {
      if (!DATA) { google.script.host.close(); return; }
      lockButtons(true);
      google.script.run
        .withSuccessHandler(function() { google.script.host.close(); })
        .withFailureHandler(function() { lockButtons(false); })
        .vc_dismiss(DATA.newestVersion);
    }

    // Two-click confirm, then permanently disables automatic checks
    function dismissForever() {
      if (!DATA) { google.script.host.close(); return; }
      const btn = document.getElementById('foreverBtn');
      if (!foreverArmed) {
        foreverArmed = true;
        btn.textContent = 'Click again to confirm 🔒';
        setTimeout(function() {
          foreverArmed = false;
          btn.textContent = 'Dismiss Forever';
        }, 4000);
        return;
      }
      lockButtons(true);
      google.script.run
        .withSuccessHandler(function() { google.script.host.close(); })
        .withFailureHandler(function() { lockButtons(false); })
        .vc_dismissForever(DATA.newestVersion);
    }

    // Saves the Majors-only preference instantly on toggle
    function savePref() {
      const on = document.getElementById('majorsOnly').checked;
      google.script.run
        .withSuccessHandler(function() {
          const tag = document.getElementById('savedTag');
          tag.classList.add('show');
          setTimeout(function() { tag.classList.remove('show'); }, 1500);
        })
        .vc_setMajorsOnly(on);
    }

    // ==========================================
    // BOOT — pull the changelog from the server
    // ==========================================
    function boot() {
      if (typeof google === 'undefined' || !google.script || !google.script.run) {
        showErrorBox('Preview mode',
          'This dialog only works inside Google Sheets. Open it from the sheet via 🚀 App Menu → 🔔 Check for Updates.');
        return;
      }

      google.script.run
        .withSuccessHandler(function(jsonStr) {
          if (!jsonStr) {
            showErrorBox('Could not reach the Version Tracker',
              'The tracker sheet could not be read. Check your internet connection, or the tracker may have been moved or unshared.');
            return;
          }
          try {
            DATA = JSON.parse(jsonStr);
          } catch (err) {
            showErrorBox('Could not read the changelog data',
              String(err && err.message ? err.message : err));
            return;
          }
          render();
        })
        .withFailureHandler(function(err) {
          showErrorBox('Server error while loading the changelog',
            String(err && err.message ? err.message : err) +
            '\n\nIf this mentions an unknown function (like vc_getPayload), your VersionCheck.gs file is out of date — re-paste the latest version of BOTH files.');
        })
        .vc_getPayload();
    }

    boot();
  </script>
</body>
</html>
